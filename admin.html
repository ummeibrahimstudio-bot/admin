<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Umme Ibrahim Studio</title>
<style>
:root{--gold:#B8922A;--gold-light:#D4AE5A;--dark:#1E1A14;--cream:#F7F3EC;--green:#3A5C3A;--red:#c0392b;--muted:#8C7A60;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0f0d0a;color:#e8e0d0;min-height:100vh;}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f0d0a,#1e1a14);}
.login-box{background:#1e1a14;border:1px solid rgba(184,146,42,0.3);border-radius:16px;padding:2.5rem;width:90%;max-width:380px;text-align:center;}
.login-box h1{font-size:1.6rem;color:var(--gold-light);margin-bottom:0.3rem;}
.login-box p{color:var(--muted);font-size:0.85rem;margin-bottom:2rem;}
.login-box input{width:100%;padding:12px 16px;background:#2a2318;border:1px solid rgba(184,146,42,0.3);border-radius:10px;color:#e8e0d0;font-size:0.95rem;margin-bottom:1rem;outline:none;}
.login-box input:focus{border-color:var(--gold);}
.btn{width:100%;padding:12px;background:var(--gold);color:#1e1a14;border:none;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
.btn:hover{background:var(--gold-light);}
.err{color:#e74c3c;font-size:0.82rem;margin-top:0.5rem;display:none;}

#adminPage{display:none;}
.admin-header{background:#1e1a14;border-bottom:2px solid var(--gold);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.admin-header h1{color:var(--gold-light);font-size:1.1rem;}
.admin-header button{background:transparent;border:1px solid rgba(184,146,42,0.4);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;}
.admin-header button:hover{color:var(--gold-light);border-color:var(--gold);}

.tabs{display:flex;gap:0;border-bottom:1px solid rgba(184,146,42,0.2);padding:0 2rem;background:#1a1610;}
.tab{padding:14px 24px;cursor:pointer;font-size:0.88rem;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active,.tab:hover{color:var(--gold-light);border-bottom-color:var(--gold);}

.content{padding:2rem;max-width:900px;margin:0 auto;}
.section-title{font-size:1.3rem;color:var(--gold-light);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;}
.btn-add{background:var(--green);color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:0.85rem;font-weight:600;}
.btn-add:hover{background:#2d4a2d;}

/* Form */
.form-box{background:#1e1a14;border:1px solid rgba(184,146,42,0.2);border-radius:14px;padding:1.8rem;margin-bottom:2rem;}
.form-box h3{color:var(--gold-light);margin-bottom:1.2rem;font-size:1rem;}
.form-row{margin-bottom:1rem;}
.form-row label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:5px;letter-spacing:0.06em;text-transform:uppercase;}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:10px 14px;background:#2a2318;border:1px solid rgba(184,146,42,0.25);border-radius:8px;color:#e8e0d0;font-size:0.92rem;outline:none;font-family:inherit;}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--gold);}
.form-row textarea{min-height:80px;resize:vertical;}
.form-row input[type="checkbox"]{width:auto;margin-right:8px;}
.form-actions{display:flex;gap:10px;margin-top:1.2rem;}
.btn-save{background:var(--gold);color:#1e1a14;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:0.88rem;font-weight:700;}
.btn-save:hover{background:var(--gold-light);}
.btn-cancel{background:transparent;border:1px solid rgba(184,146,42,0.3);color:var(--muted);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:0.88rem;}
.btn-cancel:hover{color:var(--gold-light);}

/* List items */
.item-list{display:flex;flex-direction:column;gap:10px;}
.item{background:#1e1a14;border:1px solid rgba(184,146,42,0.15);border-radius:12px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;}
.item-img{width:52px;height:52px;object-fit:cover;border-radius:8px;background:#2a2318;flex-shrink:0;}
.item-info{flex:1;}
.item-name{font-size:0.95rem;color:#e8e0d0;font-weight:600;}
.item-sub{font-size:0.75rem;color:var(--muted);margin-top:2px;}
.item-actions{display:flex;gap:6px;}
.btn-edit{background:rgba(184,146,42,0.15);border:1px solid rgba(184,146,42,0.3);color:var(--gold-light);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:0.78rem;}
.btn-edit:hover{background:rgba(184,146,42,0.25);}
.btn-del{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);color:#e74c3c;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:0.78rem;}
.btn-del:hover{background:rgba(192,57,43,0.25);}
.badge-cs{background:rgba(184,146,42,0.2);color:var(--gold-light);font-size:0.68rem;padding:2px 8px;border-radius:10px;margin-left:6px;}
.toast{position:fixed;bottom:2rem;right:2rem;background:#1e1a14;border:1px solid var(--gold);color:var(--gold-light);padding:12px 20px;border-radius:10px;font-size:0.88rem;opacity:0;transform:translateY(10px);transition:all 0.3s;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:0.9rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h1>🌙 Admin Panel</h1>
    <p>Umme Ibrahim Studio</p>
    <input type="password" id="pwdInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Login</button>
    <div class="err" id="loginErr">❌ Wrong password. Try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPage">
  <div class="admin-header">
    <h1>🌙 Umme Ibrahim Studio — Admin</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('products',this)">🛍️ Products</button>
    <button class="tab" onclick="showTab('blogs',this)">📖 Blog Posts</button>
  </div>

  <!-- PRODUCTS TAB -->
  <div id="tab-products" class="content">
    <div class="section-title">
      Products
      <button class="btn-add" onclick="showProductForm()">+ Add New Product</button>
    </div>

    <div class="form-box" id="productForm" style="display:none;">
      <h3 id="productFormTitle">Add New Product</h3>
      <input type="hidden" id="pId">
      <div class="form-row"><label>Product Name *</label><input type="text" id="pName" placeholder="e.g. Feelings & Emotions Flash Cards"></div>
      <div class="form-row"><label>Category *</label>
        <select id="pCategory">
          <option value="Books">📚 Books</option>
          <option value="Flash Cards">🃏 Flash Cards</option>
          <option value="Charts">📜 Charts</option>
        </select>
      </div>
      <div class="form-row"><label>Price (₹) *</label><input type="number" id="pPrice" placeholder="149"></div>
      <div class="form-row"><label>Description</label><textarea id="pDesc" placeholder="Describe the product..."></textarea></div>
      <div class="form-row"><label>Image URL</label><input type="text" id="pImg" placeholder="e.g. emotions_flashcards.jpg or https://..."></div>
      <div class="form-row"><label>WhatsApp Order Link (optional)</label><input type="text" id="pWa" placeholder="https://wa.me/..."></div>
      <div class="form-row"><label><input type="checkbox" id="pComingSoon"> Mark as "Coming Soon"</label></div>
      <div class="form-actions">
        <button class="btn-save" onclick="saveProduct()">Save Product</button>
        <button class="btn-cancel" onclick="hideProductForm()">Cancel</button>
      </div>
    </div>

    <div class="item-list" id="productList"><div class="empty">Loading... 🌙</div></div>
  </div>

  <!-- BLOGS TAB -->
  <div id="tab-blogs" class="content" style="display:none;">
    <div class="section-title">
      Blog Posts
      <button class="btn-add" onclick="showBlogForm()">+ Add New Post</button>
    </div>

    <div class="form-box" id="blogForm" style="display:none;">
      <h3 id="blogFormTitle">Add New Blog Post</h3>
      <input type="hidden" id="bId">
      <div class="form-row"><label>Title *</label><input type="text" id="bTitle" placeholder="e.g. 10 Screen-Free Activities for Muslim Toddlers"></div>
      <div class="form-row"><label>Tag / Category</label><input type="text" id="bTag" placeholder="e.g. Islamic Parenting"></div>
      <div class="form-row"><label>Date</label><input type="text" id="bDate" placeholder="e.g. May 2026"></div>
      <div class="form-row"><label>Short Excerpt (shown on blog page)</label><textarea id="bExcerpt" placeholder="A short summary of your post..."></textarea></div>
      <div class="form-row"><label>Full Content (optional — paste full article here)</label><textarea id="bContent" placeholder="Full article content..." style="min-height:140px;"></textarea></div>
      <div class="form-actions">
        <button class="btn-save" onclick="saveBlog()">Save Post</button>
        <button class="btn-cancel" onclick="hideBlogForm()">Cancel</button>
      </div>
    </div>

    <div class="item-list" id="blogList"><div class="empty">Loading... 🌙</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="supabase.js"></script>
<script>
// LOGIN
async function login(){
  const pwd = document.getElementById('pwdInput').value.trim();
  try {
    const res = await sbFetch('admin?select=password&id=eq.1');
    if(res.length && res[0].password === pwd){
      document.getElementById('loginPage').style.display='none';
      document.getElementById('adminPage').style.display='block';
      loadProducts();
    } else {
      document.getElementById('loginErr').style.display='block';
    }
  } catch(e){
    // fallback
    if(pwd === 'ummeibrahim2024'){
      document.getElementById('loginPage').style.display='none';
      document.getElementById('adminPage').style.display='block';
      loadProducts();
    } else {
      document.getElementById('loginErr').style.display='block';
    }
  }
}
function logout(){document.getElementById('loginPage').style.display='flex';document.getElementById('adminPage').style.display='none';}

// TABS
function showTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-products').style.display=name==='products'?'block':'none';
  document.getElementById('tab-blogs').style.display=name==='blogs'?'block':'none';
  if(name==='blogs') loadBlogs();
}

// TOAST
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── PRODUCTS ───
let editingProductId=null;
function showProductForm(p){
  document.getElementById('productForm').style.display='block';
  if(p){
    document.getElementById('productFormTitle').textContent='Edit Product';
    document.getElementById('pId').value=p.id;
    document.getElementById('pName').value=p.name||'';
    document.getElementById('pCategory').value=p.category||'Flash Cards';
    document.getElementById('pPrice').value=p.price||'';
    document.getElementById('pDesc').value=p.description||'';
    document.getElementById('pImg').value=p.image_url||'';
    document.getElementById('pWa').value=p.whatsapp_link||'';
    document.getElementById('pComingSoon').checked=!!p.is_coming_soon;
  } else {
    document.getElementById('productFormTitle').textContent='Add New Product';
    document.getElementById('pId').value='';
    document.getElementById('pName').value='';
    document.getElementById('pCategory').value='Flash Cards';
    document.getElementById('pPrice').value='';
    document.getElementById('pDesc').value='';
    document.getElementById('pImg').value='';
    document.getElementById('pWa').value='';
    document.getElementById('pComingSoon').checked=false;
  }
  document.getElementById('productForm').scrollIntoView({behavior:'smooth'});
}
function hideProductForm(){document.getElementById('productForm').style.display='none';}

async function saveProduct(){
  const id=document.getElementById('pId').value;
  const data={
    name:document.getElementById('pName').value.trim(),
    category:document.getElementById('pCategory').value,
    price:parseInt(document.getElementById('pPrice').value)||0,
    description:document.getElementById('pDesc').value.trim(),
    image_url:document.getElementById('pImg').value.trim(),
    whatsapp_link:document.getElementById('pWa').value.trim(),
    is_coming_soon:document.getElementById('pComingSoon').checked
  };
  if(!data.name){alert('Please enter product name!');return;}
  try{
    if(id){
      await sbFetch(`products?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(data)});
      showToast('✅ Product updated!');
    } else {
      await sbFetch('products',{method:'POST',body:JSON.stringify(data)});
      showToast('✅ Product added!');
    }
    hideProductForm();
    loadProducts();
  }catch(e){alert('Error: '+e.message);}
}

async function deleteProduct(id,name){
  if(!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try{
    await sbFetch(`products?id=eq.${id}`,{method:'DELETE'});
    showToast('🗑️ Product deleted');
    loadProducts();
  }catch(e){alert('Error: '+e.message);}
}

async function loadProducts(){
  try{
    const list=await getProducts();
    const el=document.getElementById('productList');
    if(!list.length){el.innerHTML='<div class="empty">No products yet. Add your first product! 🌙</div>';return;}
    el.innerHTML=list.map(p=>`
      <div class="item">
        ${p.image_url?`<img class="item-img" src="${p.image_url}" onerror="this.style.opacity=0.3">`:`<div class="item-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🌙</div>`}
        <div class="item-info">
          <div class="item-name">${p.name}${p.is_coming_soon?`<span class="badge-cs">Coming Soon</span>`:''}</div>
          <div class="item-sub">${p.category} &nbsp;·&nbsp; ₹${p.price}</div>
        </div>
        <div class="item-actions">
          <button class="btn-edit" onclick='editProduct(${JSON.stringify(p).replace(/'/g,"\\'")})''>Edit</button>
          <button class="btn-del" onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">Delete</button>
        </div>
      </div>`).join('');
  }catch(e){document.getElementById('productList').innerHTML='<div class="empty">Could not load products.</div>';}
}
function editProduct(p){showProductForm(p);}

// ─── BLOGS ───
function showBlogForm(b){
  document.getElementById('blogForm').style.display='block';
  if(b){
    document.getElementById('blogFormTitle').textContent='Edit Blog Post';
    document.getElementById('bId').value=b.id;
    document.getElementById('bTitle').value=b.title||'';
    document.getElementById('bTag').value=b.tag||'';
    document.getElementById('bDate').value=b.date||'';
    document.getElementById('bExcerpt').value=b.excerpt||'';
    document.getElementById('bContent').value=b.content||'';
  } else {
    document.getElementById('blogFormTitle').textContent='Add New Blog Post';
    document.getElementById('bId').value='';
    document.getElementById('bTitle').value='';
    document.getElementById('bTag').value='';
    document.getElementById('bDate').value='';
    document.getElementById('bExcerpt').value='';
    document.getElementById('bContent').value='';
  }
  document.getElementById('blogForm').scrollIntoView({behavior:'smooth'});
}
function hideBlogForm(){document.getElementById('blogForm').style.display='none';}

async function saveBlog(){
  const id=document.getElementById('bId').value;
  const data={
    title:document.getElementById('bTitle').value.trim(),
    tag:document.getElementById('bTag').value.trim(),
    date:document.getElementById('bDate').value.trim(),
    excerpt:document.getElementById('bExcerpt').value.trim(),
    content:document.getElementById('bContent').value.trim()
  };
  if(!data.title){alert('Please enter blog title!');return;}
  try{
    if(id){
      await sbFetch(`blogs?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(data)});
      showToast('✅ Post updated!');
    } else {
      await sbFetch('blogs',{method:'POST',body:JSON.stringify(data)});
      showToast('✅ Post added!');
    }
    hideBlogForm();
    loadBlogs();
  }catch(e){alert('Error: '+e.message);}
}

async function deleteBlog(id,title){
  if(!confirm(`Delete "${title}"?`)) return;
  try{
    await sbFetch(`blogs?id=eq.${id}`,{method:'DELETE'});
    showToast('🗑️ Post deleted');
    loadBlogs();
  }catch(e){alert('Error: '+e.message);}
}

async function loadBlogs(){
  try{
    const list=await getBlogs();
    const el=document.getElementById('blogList');
    if(!list.length){el.innerHTML='<div class="empty">No posts yet. Add your first blog post! ✍️</div>';return;}
    el.innerHTML=list.map(b=>`
      <div class="item">
        <div class="item-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:#2a2318;">📖</div>
        <div class="item-info">
          <div class="item-name">${b.title}</div>
          <div class="item-sub">${b.tag||'Blog'} &nbsp;·&nbsp; ${b.date||''}</div>
        </div>
        <div class="item-actions">
          <button class="btn-edit" onclick='editBlog(${JSON.stringify(b).replace(/'/g,"\\'")})''>Edit</button>
          <button class="btn-del" onclick="deleteBlog('${b.id}','${b.title.replace(/'/g,"\\'")}')">Delete</button>
        </div>
      </div>`).join('');
  }catch(e){document.getElementById('blogList').innerHTML='<div class="empty">Could not load posts.</div>';}
}
function editBlog(b){showBlogForm(b);}
</script>
</body>
</html>
